spring:
  application:
    name: scim-service

  datasource:
    url: jdbc:postgresql://localhost:5432/scimdb
    username: scimuser
    password: scimpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema, not Hibernate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.github.kushaal: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss} %-5level [%X{correlationId}] %logger{36} - %msg%n"